version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend-only/Dockerfile
    container_name: poc45-backend
    ports:
      - "8000:8000"
    environment:
      - BACKEND_PORT=8000
      - ENVIRONMENT=docker
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - poc45-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: poc45-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - FRONTEND_PORT=3000
    depends_on:
      - backend
    networks:
      - poc45-network

networks:
  poc45-network:
    driver: bridge
